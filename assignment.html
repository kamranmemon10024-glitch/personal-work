<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>
    <link rel="stylesheet" href="assignment.css">
</head>

<body>

    <div class="main">
        <div class="sidebar">
            <h2>RealSpine</h2>
            <ul>
                <li class="active">Dashboard</li>
                <li>Property</li>
                <li>Analytics</li>
                <li>Agents</li>
                <li>Transaction</li>
                <li>Setting</li>
            </ul>
        </div>
        <div class="content">
            <div class="header">
                <input type="text" placeholder="Search here...">
            </div>


            <div class="cards">

                <div class="card">
                    <p>Total Income</p>
                    <h2>$16,860</h2>
                    <span class="green">+24%</span>
                </div>

                <div class="card">
                    <p>Total Expenses</p>
                    <h2>$12,500</h2>
                    <span class="red">-14%</span>
                </div>

                <div class="card">
                    <p>Available Property</p>
                    <h2>$26,260</h2>
                    <span class="green">+12%</span>
                </div>

                <div class="card">
                    <p>Property Rent</p>
                    <h2>$5,890</h2>
                    <span class="red">-17%</span>
                </div>

                <div class="card">
                    <p>Total Visitors</p>
                    <h2>52,950</h2>
                    <span class="green">+32%</span>
                </div>

            </div>


            <div class="bottom">

                <div class="dashboard-2">Sales Analytics</div>
                <div class="box large">Recent Orders</div>
            </div>

        </div>

    </div>

    </div>

</body>

</html>
